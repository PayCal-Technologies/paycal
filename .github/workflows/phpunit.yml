name: PHPUnit

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "html/**"
      - "scripts/test/**"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml"
      - "infection.json.dist"
      - ".github/workflows/phpunit.yml"
  push:
    branches: [ main ]
    paths:
      - "html/**"
      - "scripts/test/**"
      - "composer.json"
      - "composer.lock"
      - "phpunit.xml"
      - "infection.json.dist"
      - ".github/workflows/phpunit.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  fast-gate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2", "8.5"]
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Stage 1 Fast Gate (unit)
        run: composer run test:unit

  full-validation:
    if: github.event_name != 'schedule'
    needs: fast-gate
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Stage 2 Full Validation (unit + integration + contract)
        run: composer run test:all

  deep-verification:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Stage 3 Deep Verification (random order)
        run: composer run test:random

      - name: Stage 3 Deep Verification (coverage)
        run: composer run test:coverage

      - name: Generate junit.xml
        run: composer run test:junit

      - name: Stage 4 Quality (mutation)
        run: composer run test:mutation

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paycal-coverage-html
          path: coverage
          retention-days: 30

      - name: Upload junit.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paycal-junit
          path: junit.xml
          retention-days: 30

      - name: Upload infection report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paycal-infection-report
          path: infection-output
          retention-days: 30
