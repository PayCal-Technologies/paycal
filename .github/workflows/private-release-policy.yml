name: Release Policy

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-tag-signature:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify tag is annotated and signed
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tagName = context.ref.replace('refs/tags/', '');

            const ref = await github.rest.git.getRef({
              owner,
              repo,
              ref: `tags/${tagName}`,
            });

            if (ref.data.object.type !== 'tag') {
              core.setFailed(`Tag ${tagName} is lightweight. Annotated tags are required.`);
              return;
            }

            const tagObj = await github.rest.git.getTag({
              owner,
              repo,
              tag_sha: ref.data.object.sha,
            });

            const verification = tagObj.data.verification || {};
            if (!verification.verified) {
              const reason = verification.reason || 'unknown';
              core.setFailed(`Tag ${tagName} is not signature-verified by GitHub. Reason: ${reason}`);
              return;
            }

            core.notice(`Signed annotated tag verified: ${tagName}`);

  validate-release-target:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify release target branch
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const release = context.payload.release;
            const defaultBranch = context.payload.repository.default_branch;
            const target = release.target_commitish;

            if (target !== defaultBranch) {
              core.setFailed(
                `Release target must be ${defaultBranch}; got ${target}.`
              );
              return;
            }

            core.notice(`Release ${release.tag_name} targets default branch ${defaultBranch}.`);
