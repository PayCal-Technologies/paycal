name: JavaScript Quality

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

on:
  pull_request:
    paths:
      - "html/js/**"
      - "tools/js-security-check.mjs"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - ".github/workflows/javascript.yml"
  push:
    branches: [ main ]
    paths:
      - "html/js/**"
      - "tools/js-security-check.mjs"
      - "package.json"
      - "package-lock.json"
      - "eslint.config.js"
      - ".github/workflows/javascript.yml"
  workflow_dispatch:

jobs:
  javascript-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:js

      - name: Run JavaScript Security Check
        run: node tools/js-security-check.mjs

      - name: Summary
        if: success()
        run: |
          echo "✅ JavaScript quality checks passed"
          echo "- ESLint: no errors"
          echo "- Security: no disallowed HTML sinks found"
